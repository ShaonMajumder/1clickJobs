<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Job Tracker</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 28px 18px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    header p {
      margin: 0;
      opacity: 0.9;
    }

    main {
      max-width: 1100px;
      margin: 22px auto 40px;
      padding: 0 16px;
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    input, select, button {
      font: inherit;
    }

    input[type="url"], input[type="search"], input[type="text"] {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: white;
    }

    button:hover { background: var(--primary-dark); }

    button.secondary {
      background: #eef2ff;
      color: #1e40af;
    }

    button.secondary:hover { background: #dbeafe; }

    button.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    button.danger:hover { background: #fecaca; }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row > * { flex: 1; }

    .row button { flex: 0 0 auto; }

    .hint, .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .message {
      min-height: 20px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .message.error { color: var(--danger); }
    .message.success { color: #047857; }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    .job, .source {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: white;
      margin-bottom: 10px;
    }

    .job-top, .source-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .domain {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .url {
      word-break: break-all;
      color: var(--muted);
      font-size: 13px;
    }

    .url a {
      color: inherit;
    }

    .job-actions, .source-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
    }

    .empty {
      padding: 22px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      text-align: center;
      color: var(--muted);
      background: #fafafa;
    }

    @media (max-width: 820px) {
      .grid, .toolbar {
        grid-template-columns: 1fr;
      }

      .job-top, .source-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Minimal Job Tracker</h1>
    <p>Paste a job link. It saves instantly with status Open. No backend, no login.</p>
  </header>

  <main>
    <section class="card">
      <h2>Track Job</h2>
      <input id="jobUrlInput" type="url" placeholder="Paste job link and press Enter" autocomplete="off" />
      <div id="jobMessage" class="message"></div>
      <p class="hint">Example: https://www.linkedin.com/jobs/view/123</p>
    </section>

    <section class="grid">
      <section class="card">
        <h2>Jobs</h2>
        <div class="toolbar">
          <input id="jobSearch" type="search" placeholder="Search jobs or source domain" />
          <button id="exportBtn" class="secondary" type="button">Export JSON</button>
          <button id="importBtn" class="secondary" type="button">Import JSON</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
        <div id="jobsList"></div>
      </section>

      <section class="card">
        <h2>Sources</h2>
        <div class="row">
          <input id="sourceUrlInput" type="url" placeholder="Paste source/portal URL and press Enter" autocomplete="off" />
          <button id="saveSourceBtn" type="button">Save</button>
        </div>
        <div id="sourceMessage" class="message"></div>
        <p class="hint">Manual sources save instantly. You can mark any source as portal later.</p>
        <div id="sourcesList"></div>
      </section>
    </section>
  </main>

  <script>
    const DB_NAME = "minimalJobTrackerDB";
    const DB_VERSION = 1;
    const JOBS_STORE = "jobs";
    const SOURCES_STORE = "sources";
    const STATUS_OPTIONS = ["Open", "Applied", "Interview", "Offer", "Rejected", "Ghosted", "Closed"];

    let db;
    let jobs = [];
    let sources = [];

    const jobUrlInput = document.getElementById("jobUrlInput");
    const jobMessage = document.getElementById("jobMessage");
    const jobSearch = document.getElementById("jobSearch");
    const jobsList = document.getElementById("jobsList");

    const sourceUrlInput = document.getElementById("sourceUrlInput");
    const saveSourceBtn = document.getElementById("saveSourceBtn");
    const sourceMessage = document.getElementById("sourceMessage");
    const sourcesList = document.getElementById("sourcesList");

    const exportBtn = document.getElementById("exportBtn");
    const importBtn = document.getElementById("importBtn");
    const importFile = document.getElementById("importFile");

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = event => {
          const database = event.target.result;

          if (!database.objectStoreNames.contains(JOBS_STORE)) {
            const jobStore = database.createObjectStore(JOBS_STORE, { keyPath: "id" });
            jobStore.createIndex("jobUrl", "jobUrl", { unique: true });
            jobStore.createIndex("sourceDomain", "sourceDomain", { unique: false });
            jobStore.createIndex("status", "status", { unique: false });
            jobStore.createIndex("createdAt", "createdAt", { unique: false });
            jobStore.createIndex("updatedAt", "updatedAt", { unique: false });
          }

          if (!database.objectStoreNames.contains(SOURCES_STORE)) {
            const sourceStore = database.createObjectStore(SOURCES_STORE, { keyPath: "id" });
            sourceStore.createIndex("domain", "domain", { unique: true });
            sourceStore.createIndex("sourceUrl", "sourceUrl", { unique: false });
            sourceStore.createIndex("displayName", "displayName", { unique: false });
            sourceStore.createIndex("isPortal", "isPortal", { unique: false });
          }
        };

        request.onsuccess = event => resolve(event.target.result);
        request.onerror = event => reject(event.target.error);
      });
    }

    function store(name, mode = "readonly") {
      return db.transaction(name, mode).objectStore(name);
    }

    function getAll(name) {
      return new Promise((resolve, reject) => {
        const request = store(name).getAll();
        request.onsuccess = () => resolve(request.result || []);
        request.onerror = () => reject(request.error);
      });
    }

    function put(name, record) {
      return new Promise((resolve, reject) => {
        const request = store(name, "readwrite").put(record);
        request.onsuccess = () => resolve(record);
        request.onerror = () => reject(request.error);
      });
    }

    function remove(name, id) {
      return new Promise((resolve, reject) => {
        const request = store(name, "readwrite").delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    function clearStore(name) {
      return new Promise((resolve, reject) => {
        const request = store(name, "readwrite").clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    function normalizeUrl(value) {
      const raw = value.trim();
      if (!raw) throw new Error("URL is required.");
      const withProtocol = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
      const url = new URL(withProtocol);
      return url.href;
    }

    function getDomain(urlValue) {
      const url = new URL(urlValue);
      return url.hostname.replace(/^www\./i, "").toLowerCase();
    }

    function setMessage(element, text, type = "") {
      element.textContent = text;
      element.className = `message ${type}`.trim();
    }

    function makeId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2);
    }

    async function refresh() {
      jobs = await getAll(JOBS_STORE);
      sources = await getAll(SOURCES_STORE);
      jobs.sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
      sources.sort((a, b) => (a.domain || "").localeCompare(b.domain || ""));
      renderJobs();
      renderSources();
    }

    async function ensureSource(sourceUrl, defaultIsPortal) {
      const normalizedSourceUrl = normalizeUrl(sourceUrl);
      const domain = getDomain(normalizedSourceUrl);
      const existing = sources.find(source => source.domain === domain);

      if (existing) return existing;

      const now = new Date().toISOString();
      const source = {
        id: makeId(),
        domain,
        sourceUrl: normalizedSourceUrl,
        displayName: domain,
        isPortal: Boolean(defaultIsPortal),
        createdAt: now,
        updatedAt: now
      };

      await put(SOURCES_STORE, source);
      sources.push(source);
      return source;
    }

    async function saveJobFromInput() {
      try {
        const jobUrl = normalizeUrl(jobUrlInput.value);
        const sourceDomain = getDomain(jobUrl);
        const exists = jobs.some(job => job.jobUrl === jobUrl);

        if (exists) {
          setMessage(jobMessage, "Already saved.", "error");
          return;
        }

        await ensureSource(jobUrl, true);

        const now = new Date().toISOString();
        const job = {
          id: makeId(),
          jobUrl,
          sourceDomain,
          status: "Open",
          createdAt: now,
          updatedAt: now
        };

        await put(JOBS_STORE, job);
        jobUrlInput.value = "";
        setMessage(jobMessage, "Saved with status Open.", "success");
        await refresh();
      } catch (error) {
        setMessage(jobMessage, error.message || "Invalid URL.", "error");
      }
    }

    async function saveManualSource() {
      try {
        const source = await ensureSource(sourceUrlInput.value, false);
        sourceUrlInput.value = "";
        setMessage(sourceMessage, `Saved source: ${source.domain}`, "success");
        await refresh();
      } catch (error) {
        setMessage(sourceMessage, error.message || "Invalid source URL.", "error");
      }
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function statusSelect(job) {
      return `
        <select onchange="updateJobStatus('${job.id}', this.value)">
          ${STATUS_OPTIONS.map(status => `
            <option value="${status}" ${job.status === status ? "selected" : ""}>${status}</option>
          `).join("")}
        </select>
      `;
    }

    function renderJobs() {
      const query = jobSearch.value.trim().toLowerCase();
      const filtered = jobs.filter(job => {
        const text = `${job.jobUrl} ${job.sourceDomain} ${job.status}`.toLowerCase();
        return !query || text.includes(query);
      });

      if (!filtered.length) {
        jobsList.innerHTML = `<div class="empty">No jobs yet. Paste a job link to start.</div>`;
        return;
      }

      jobsList.innerHTML = filtered.map(job => `
        <div class="job">
          <div class="job-top">
            <div>
              <div class="domain">${escapeHTML(job.sourceDomain)}</div>
              <div class="url"><a href="${escapeHTML(job.jobUrl)}" target="_blank" rel="noopener">${escapeHTML(job.jobUrl)}</a></div>
              <div class="muted">Added: ${new Date(job.createdAt).toLocaleString()}</div>
            </div>
          </div>
          <div class="job-actions">
            ${statusSelect(job)}
            <button class="danger" onclick="deleteJob('${job.id}')">Delete</button>
          </div>
        </div>
      `).join("");
    }

    function renderSources() {
      if (!sources.length) {
        sourcesList.innerHTML = `<div class="empty">No sources yet.</div>`;
        return;
      }

      sourcesList.innerHTML = sources.map(source => `
        <div class="source">
          <div class="source-top">
            <div>
              <div class="domain">${escapeHTML(source.displayName || source.domain)}</div>
              <div class="muted">Domain: ${escapeHTML(source.domain)}</div>
              <div class="url"><a href="${escapeHTML(source.sourceUrl)}" target="_blank" rel="noopener">${escapeHTML(source.sourceUrl)}</a></div>
            </div>
          </div>
          <div class="source-actions">
            <label class="checkbox">
              <input type="checkbox" ${source.isPortal ? "checked" : ""} onchange="togglePortal('${source.id}', this.checked)" />
              isPortal
            </label>
            <button class="danger" onclick="deleteSource('${source.id}')">Delete</button>
          </div>
        </div>
      `).join("");
    }

    window.updateJobStatus = async function(id, status) {
      const job = jobs.find(item => item.id === id);
      if (!job) return;
      job.status = status;
      job.updatedAt = new Date().toISOString();
      await put(JOBS_STORE, job);
      await refresh();
    };

    window.togglePortal = async function(id, checked) {
      const source = sources.find(item => item.id === id);
      if (!source) return;
      source.isPortal = checked;
      source.updatedAt = new Date().toISOString();
      await put(SOURCES_STORE, source);
      await refresh();
    };

    window.deleteJob = async function(id) {
      if (!confirm("Delete this job?")) return;
      await remove(JOBS_STORE, id);
      await refresh();
    };

    window.deleteSource = async function(id) {
      const source = sources.find(item => item.id === id);
      if (!source) return;
      const used = jobs.some(job => job.sourceDomain === source.domain);
      if (used) {
        alert("This source is used by saved jobs. Delete those jobs first.");
        return;
      }
      if (!confirm("Delete this source?")) return;
      await remove(SOURCES_STORE, id);
      await refresh();
    };

    jobUrlInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        saveJobFromInput();
      }
    });

    jobUrlInput.addEventListener("paste", () => {
      setTimeout(() => {
        if (jobUrlInput.value.trim()) saveJobFromInput();
      }, 0);
    });

    sourceUrlInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        saveManualSource();
      }
    });

    sourceUrlInput.addEventListener("paste", () => {
      setTimeout(() => {
        if (sourceUrlInput.value.trim()) saveManualSource();
      }, 0);
    });

    saveSourceBtn.addEventListener("click", saveManualSource);
    jobSearch.addEventListener("input", renderJobs);

    exportBtn.addEventListener("click", () => {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        jobs,
        sources
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `minimal-job-tracker-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    importBtn.addEventListener("click", () => importFile.click());

    importFile.addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;

      try {
        const data = JSON.parse(await file.text());
        const importedJobs = Array.isArray(data.jobs) ? data.jobs : [];
        const importedSources = Array.isArray(data.sources) ? data.sources : [];

        const replace = confirm("Import backup? OK = replace all data. Cancel = merge.");

        if (replace) {
          await clearStore(JOBS_STORE);
          await clearStore(SOURCES_STORE);
        }

        for (const source of importedSources) {
          if (!source.domain || !source.sourceUrl) continue;
          await put(SOURCES_STORE, {
            id: source.id || makeId(),
            domain: source.domain,
            sourceUrl: source.sourceUrl,
            displayName: source.displayName || source.domain,
            isPortal: Boolean(source.isPortal),
            createdAt: source.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
        }

        for (const job of importedJobs) {
          if (!job.jobUrl) continue;
          const jobUrl = normalizeUrl(job.jobUrl);
          const sourceDomain = job.sourceDomain || getDomain(jobUrl);
          await put(JOBS_STORE, {
            id: job.id || makeId(),
            jobUrl,
            sourceDomain,
            status: STATUS_OPTIONS.includes(job.status) ? job.status : "Open",
            createdAt: job.createdAt || new Date().toISOString(),
            updatedAt: new Date().toISOString()
          });
          await ensureSource(jobUrl, true);
        }

        importFile.value = "";
        await refresh();
        alert("Import complete.");
      } catch (error) {
        alert("Import failed: " + error.message);
      }
    });

    async function init() {
      db = await openDB();
      await refresh();
    }

    init().catch(error => {
      console.error(error);
      jobsList.innerHTML = `<div class="empty">Could not open IndexedDB.</div>`;
    });
  </script>
</body>
</html>
